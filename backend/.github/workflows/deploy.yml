name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Aikido Code Quality scan — enabled by the kiosk "Aikido Code Quality"
      # toggle, which causes the kiosk agent to push AIKIDO_CLIENT_ID and
      # AIKIDO_CLIENT_SECRET Actions secrets onto this repo. When either is
      # absent the step is skipped, so the workflow keeps working for apps
      # that opted out. The step exchanges the OAuth2 client credentials for
      # a bearer token against the Aikido Public REST API, then queries open
      # high/critical issues for this repo and fails the build if any exist.
      - name: Aikido Code Quality scan
        if: ${{ secrets.AIKIDO_CLIENT_ID != '' && secrets.AIKIDO_CLIENT_SECRET != '' }}
        env:
          AIKIDO_CLIENT_ID: ${{ secrets.AIKIDO_CLIENT_ID }}
          AIKIDO_CLIENT_SECRET: ${{ secrets.AIKIDO_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          echo "::group::Aikido OAuth2 token exchange"
          ACCESS_TOKEN=$(curl -fsS -X POST https://app.aikido.dev/api/oauth/token \
            -u "${AIKIDO_CLIENT_ID}:${AIKIDO_CLIENT_SECRET}" \
            -d "grant_type=client_credentials" | jq -r .access_token)
          if [ -z "${ACCESS_TOKEN:-}" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "::error::Failed to obtain Aikido access token"; exit 1
          fi
          echo "Aikido OAuth2 token obtained"
          echo "::endgroup::"
          echo "::group::Aikido open-issues check"
          HTTP_CODE=$(curl -fsS -o aikido-issues.json -w "%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://app.aikido.dev/api/public/v1/open-issues/export?filter_severities=critical,high&format=json" || true)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Aikido API returned HTTP $HTTP_CODE — leaving Aikido auto-scan to flag issues asynchronously."
            exit 0
          fi
          COUNT=$(jq '[.[] | select(.repository_external_id == env.GITHUB_REPOSITORY)] | length' aikido-issues.json 2>/dev/null || echo 0)
          echo "Aikido open high/critical issues for $GITHUB_REPOSITORY: $COUNT"
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "::error::Aikido found $COUNT open high/critical issues — failing the build."
            jq '[.[] | select(.repository_external_id == env.GITHUB_REPOSITORY) | {id, title, severity}]' aikido-issues.json || true
            exit 1
          fi
          echo "::endgroup::"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: tag
        run: echo "tag=${{ secrets.ACR_REGISTRY }}/web-${{ github.repository_id }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        run: |
          az acr login --name "${{ secrets.ACR_REGISTRY }}"
          docker build -t "${{ steps.tag.outputs.tag }}" .
          docker push "${{ steps.tag.outputs.tag }}"

      - name: Deploy to Container Apps
        if: github.ref == 'refs/heads/main'
        run: |
          az containerapp update \
            --name "${{ secrets.CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --image "${{ steps.tag.outputs.tag }}"
